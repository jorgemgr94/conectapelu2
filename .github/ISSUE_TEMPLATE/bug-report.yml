name: Bug report
description: Report a reproducible problem in ConectaPelu2.
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence of steps.
      placeholder: |
        1. Sign in as...
        2. Open...
        3. Submit...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected, how often, and is data or authorization involved?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Local, preview, or production; browser/device when relevant
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add safe logs, screenshots, or recordings. Remove credentials and personal data.
