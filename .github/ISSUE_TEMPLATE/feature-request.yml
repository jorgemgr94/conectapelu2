name: Feature request
description: Propose a user-facing or operational improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which user or operator problem needs solving?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable success without prescribing an implementation.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: Include important exclusions and affected roles or organizations.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Security, data, and migration considerations
      description: Note authorization, tenant isolation, migrations, or rollout concerns.
